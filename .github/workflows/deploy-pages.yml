name: Deploy BIH Command Center

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      reason:
        description: "Motivo do deploy manual"
        required: false
        default: "Deploy manual autorizado por Andre Dorsch"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "bih-command-center-pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build static Pages artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: BOS-072 G1 — Validate static entrypoint
        run: |
          set -euo pipefail
          test -f index.html
          grep -qi "BIH Command Center" index.html

      - name: BOS-072 G2 — Validate BIH visual identity marker
        run: |
          set -euo pipefail
          grep -q "#06090f" index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "."

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: BOS-072 G4 — Confirm deployment metadata
        run: |
          set -euo pipefail
          echo "Branch em produção: ${{ github.ref_name }}"
          echo "Commit SHA: ${{ github.sha }}"
          echo "Evento: ${{ github.event_name }}"
          echo "URL publicada: ${{ steps.deployment.outputs.page_url }}"

  validate-rendered:
    name: Validate rendered GitHub Pages URL
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: BOS-072 G3 — Validate rendered URL HTTP 200
        env:
          LINK_RENDERIZADO: ${{ needs.deploy.outputs.page_url }}
        run: |
          set -euo pipefail

          if [ -z "${LINK_RENDERIZADO}" ]; then
            echo "ERRO: LINK_RENDERIZADO vazio."
            exit 1
          fi

          echo "Validando URL publicada: ${LINK_RENDERIZADO}"

          STATUS_CODE="000"

          for attempt in 1 2 3 4 5 6; do
            STATUS_CODE="$(curl -L -s -o /tmp/bih-command-center.html -w "%{http_code}" --max-time 30 "${LINK_RENDERIZADO}")"

            if [ "${STATUS_CODE}" = "200" ]; then
              echo "BOS-072 G3: ✅ PASSOU — HTTP 200 na tentativa ${attempt}"
              grep -qi "BIH Command Center" /tmp/bih-command-center.html
              grep -q "#06090f" /tmp/bih-command-center.html
              exit 0
            fi

            echo "Tentativa ${attempt}: HTTP ${STATUS_CODE}. Aguardando..."
            sleep 10
          done

          echo "BOS-072 G3: ❌ FALHOU — HTTP final ${STATUS_CODE}"
          exit 1
